name: Feature request
description: Propose a Buildr product capability or workflow improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user or Agent problem before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Compatibility and boundaries
      description: Note affected assets, runtimes, commands, or data contracts.

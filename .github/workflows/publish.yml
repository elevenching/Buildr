name: Publish Buildr

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: npm-production
    defaults:
      run:
        working-directory: projects/product/services/buildr
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install supported npm CLI
        run: npm install --global npm@11.5.1
      - name: Install product dependencies
        run: npm ci
      - name: Resolve release contract
        id: contract
        run: node scripts/release/release-contract.mjs "${GITHUB_REF_NAME}"
      - name: Generate GitHub release notes
        run: |
          node scripts/release/release-notes.mjs \
            "${{ steps.contract.outputs.version }}" \
            ../../../../CHANGELOG.md \
            > "${RUNNER_TEMP}/buildr-release-notes.md"
      - name: Verify final release candidate
        env:
          BUILDR_TIMING_OUTPUT: ${{ runner.temp }}/buildr-release-verification-timing.json
          BUILDR_DIAGNOSTICS_OUTPUT: ${{ runner.temp }}/buildr-release-verification-diagnostics
        run: ./scripts/verify-buildr-product
      - name: Check official registry version
        id: registry
        run: >-
          node scripts/release/registry-version-state.mjs
          "${{ steps.contract.outputs.version }}"
      - name: Publish public npm package
        if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --tag "${{ steps.contract.outputs.npm_tag }}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --notes-file "${RUNNER_TEMP}/buildr-release-notes.md"
          ${{ steps.contract.outputs.prerelease == 'true' && '--prerelease' || '' }}
          ${{ steps.contract.outputs.prerelease == 'true' && '--latest=false' || '' }}
      - name: Upload release verification timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-verification-timing-${{ github.ref_name }}
          path: ${{ runner.temp }}/buildr-release-verification-timing.json
          if-no-files-found: warn
      - name: Upload release failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-verification-diagnostics-${{ github.ref_name }}
          path: ${{ runner.temp }}/buildr-release-verification-diagnostics
          if-no-files-found: ignore

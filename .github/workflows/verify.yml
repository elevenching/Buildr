name: Verify Buildr

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  product:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: projects/product
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: projects/product/package-lock.json
      - name: Install product dependencies
        run: npm ci
      - name: Verify final product candidate
        env:
          BUILDR_TIMING_OUTPUT: ${{ runner.temp }}/buildr-verification-timing.json
          BUILDR_DIAGNOSTICS_OUTPUT: ${{ runner.temp }}/buildr-verification-diagnostics
        run: ./tools/verify-buildr-product
      - name: Upload verification timing
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-timing-linux-node-${{ matrix.node }}
          path: ${{ runner.temp }}/buildr-verification-timing.json
          if-no-files-found: warn
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: verification-diagnostics-linux-node-${{ matrix.node }}
          path: ${{ runner.temp }}/buildr-verification-diagnostics
          if-no-files-found: ignore

  release-smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    defaults:
      run:
        working-directory: projects/product
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/product/package-lock.json
      - name: Install product dependencies
        run: npm ci
      - name: Verify packed release lifecycle
        run: npm run test:release

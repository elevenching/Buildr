<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="buildr-session" content="__BUILDR_SESSION_TOKEN__">
  <title>Buildr 工作空间</title>
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAusB9Wl2nKAAAAAASUVORK5CYII=">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Buildr 主导航">
      <a class="brand" href="/" data-route aria-label="Buildr 工作空间首页">
        <span class="brand-mark">B</span>
        <span><strong>Buildr</strong><small>全局应用</small></span>
      </a>
      <div class="workspace-context">
        <span class="context-label">当前工作空间</span>
        <strong id="shell-workspace-name">正在读取…</strong>
        <span id="shell-workspace-path">本机应用</span>
      </div>
      <nav class="nav-list">
        <a href="/" data-route data-nav="workspaces"><span class="nav-icon">▦</span><span>工作空间</span></a>
        <a href="/overview" data-route data-nav="overview" data-workspace-route="/"><span class="nav-icon">⌂</span><span>概览</span></a>
      </nav>
      <div class="nav-group" data-nav-group="resources">
        <button id="resource-nav-toggle" class="nav-group-toggle" type="button" aria-expanded="true" aria-controls="resource-nav-children">
          <span class="nav-icon">◇</span><span>资源</span><span class="nav-chevron">⌄</span>
        </button>
        <nav id="resource-nav-children" class="nav-children" aria-label="资源类型">
          <a href="/projects" data-route data-nav="projects" data-workspace-route="/projects"><span>项目</span><small>Project</small></a>
          <a href="/services" data-route data-nav="services" data-workspace-route="/services"><span>服务</span><small>Service</small></a>
          <a href="/changes" data-route data-nav="changes" data-workspace-route="/changes"><span>变更</span><small>Change</small></a>
        </nav>
      </div>
      <nav class="nav-list nav-secondary">
        <a href="/settings" data-route data-nav="settings" data-workspace-route="/settings"><span class="nav-icon">⚙</span><span>工作空间设置</span></a>
        <button id="quit-buildr" class="nav-quit" type="button"><span class="nav-icon">⏻</span><span>退出 Buildr</span></button>
      </nav>
      <div class="local-note"><span class="status-dot"></span>仅限本机访问</div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <div class="mobile-brand"><span class="brand-mark">B</span><strong>Buildr</strong></div>
        <div id="page-breadcrumb" class="breadcrumb" aria-label="当前位置"><span>工作空间</span></div>
        <button id="open-agent-action" class="button primary" type="button"><span>＋</span> 交给 Agent</button>
      </header>
      <main id="app-view" tabindex="-1" aria-live="polite">
        <div class="page-loading"><span class="loader"></span><p>正在读取工作空间…</p></div>
      </main>
    </div>
  </div>

  <div id="agent-action-backdrop" class="drawer-backdrop hidden"></div>
  <aside id="agent-action-drawer" class="drawer hidden" aria-hidden="true" aria-labelledby="agent-action-title">
    <div class="drawer-header">
      <div><p class="eyebrow">AGENT ACTION</p><h2 id="agent-action-title">交给 Agent</h2></div>
      <button id="close-agent-action" class="icon-button" type="button" aria-label="关闭">×</button>
    </div>
    <div id="agent-action-content"></div>
  </aside>

  <script type="module" src="/app.js"></script>
</body>
</html>

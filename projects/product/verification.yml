schemaVersion: buildr.project-verification/v1
mode: augment
capabilities:
  - id: product.fast
    title: Buildr Product Fast 验证
    command:
      argv: ["npm", "test"]
      cwd: services/buildr
    maturity: stable
    stages: [affected]
    enforcement:
      affected: required
    applicability:
      paths: ["**"]
      risks: []
    coverage:
      kind: integration
      owns: ["unit、静态契约、fast integration、CLI 架构、OpenSpec strict 与 runtime adapter contract"]
    environment:
      requires: [node, npm]
      services: []
    effects:
      level: local-temporary
      writes: ["系统临时目录中的验证 fixture 与 diagnostics"]
      externalSystems: false
    authorization: implicit
    dependsOn: []
    supersedes: []
    sources: ["AGENTS.md", "services/buildr/package.json", "services/buildr/test/verification/registry.mjs"]
  - id: product.candidate
    title: Buildr Product Candidate 验证
    command:
      argv: ["npm", "run", "test:candidate"]
      cwd: services/buildr
    maturity: stable
    stages: [candidate]
    enforcement:
      candidate: required
    applicability:
      paths: ["**"]
      risks: ["package、runtime、workspace lifecycle、发布与 OpenSpec 契约回归"]
    coverage:
      kind: end-to-end
      owns: ["Product Project 与 Buildr Service 的完整候选门禁"]
    environment:
      requires: [node, npm]
      services: []
    effects:
      level: local-temporary
      writes: ["系统临时目录中的候选 workspace、tarball、timing evidence 与 diagnostics"]
      externalSystems: false
    authorization: implicit
    dependsOn: []
    supersedes: []
    sources: ["AGENTS.md", "services/buildr/docs/release-checklist.md", ".github/workflows/verify.yml"]

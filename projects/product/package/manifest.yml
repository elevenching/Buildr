include:
  - LICENSE
  - README.md
  - docs/agent-runtime-adapters.md
  - docs/cli-reference.md
  - docs/skill-capability-contracts.md
  - docs/cli-architecture.md
  - docs/known-limitations.md
  - package/

agentSkills:
  - id: buildr
    path: package/targets/runtime/skills/buildr
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy

capabilityContracts:
  - id: buildr.git-single-operation
    version: 1
    description: 安全执行一个明确的 Git 操作并返回可审计结果。
    path: package/targets/workspace/skills/contracts/buildr/git-single-operation/v1.md
    target: skills/contracts/buildr/git-single-operation/v1.md
  - id: buildr.git-task-integration
    version: 1
    description: 提交并把已验证任务安全集成到目标分支。
    path: package/targets/workspace/skills/contracts/buildr/git-task-integration/v1.md
    target: skills/contracts/buildr/git-task-integration/v1.md
  - id: buildr.git-workspace-update
    version: 1
    description: 在 workspace sync 前安全更新 Git checkout。
    path: package/targets/workspace/skills/contracts/buildr/git-workspace-update/v1.md
    target: skills/contracts/buildr/git-workspace-update/v1.md
  - id: buildr.task-worktree-lifecycle
    version: 1
    description: 管理任务 worktree 的放置、保留和安全清理。
    path: package/targets/workspace/skills/contracts/buildr/task-worktree-lifecycle/v1.md
    target: skills/contracts/buildr/task-worktree-lifecycle/v1.md
  - id: buildr.task-finish
    version: 1
    description: 编排已验证任务的归档、集成、推送与本地收尾。
    path: package/targets/workspace/skills/contracts/buildr/task-finish/v1.md
    target: skills/contracts/buildr/task-finish/v1.md
  - id: buildr.task-asset-review
    version: 1
    description: 审查任务过程并提出可沉淀工作资产候选。
    path: package/targets/workspace/skills/contracts/buildr/task-asset-review/v1.md
    target: skills/contracts/buildr/task-asset-review/v1.md

initialSkillBindings:
  - capability: buildr.git-single-operation
    version: 1
    provider: git-ops
  - capability: buildr.git-task-integration
    version: 1
    provider: git-ops
  - capability: buildr.git-workspace-update
    version: 1
    provider: git-ops
  - capability: buildr.task-worktree-lifecycle
    version: 1
    provider: task-worktree
  - capability: buildr.task-finish
    version: 1
    provider: task-finish
  - capability: buildr.task-asset-review
    version: 1
    provider: task-asset-review

builtins:
  rules:
    - id: buildr-core
      path: package/targets/workspace/rules/buildr/core.md
      target: rules/buildr/core.md
      description: Buildr workspace 基础契约；每次进入 workspace 都必须读取。
      required: true
  skills:
    - id: task-triage
      path: package/targets/workspace/skills/buildr/task-triage
      target: skills/buildr/task-triage
      description: 用户要求修 bug、实现或调整功能、改需求、重构、优化、补文档、补测试、调整 API/契约/权限/状态流/数据语义，或询问某项改动是否需要更新 spec、创建 change、只改代码时使用。
      required: false
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: task-cockpit
      path: package/targets/workspace/skills/buildr/task-cockpit
      target: skills/buildr/task-cockpit
      description: 为复杂、长期、跨批次、跨 change、跨服务或团队的任务维护只读 HTML 任务驾驶舱（任务看板）、change 关联、交付批次和依赖池；用户明确要求任务看板、整体进度或长期跟踪时也使用。
      required: false
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: capability-adaptation
      path: package/targets/workspace/skills/buildr/capability-adaptation
      target: skills/buildr/capability-adaptation
      description: 用户要求采用内部流程、调整工作方式、修改默认 Skill 行为、创建或替换专业 Skill、卸载可能被编排的 Skill，或 Agent 准备改变 capability contract 及跨 Skill 协作边界时使用。
      required: false
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: task-asset-review
      path: package/targets/workspace/skills/buildr/task-asset-review
      target: skills/buildr/task-asset-review
      description: 用户明确要求复盘任务执行质量、核对现有资产覆盖、总结可沉淀的 Skill 或 Rule，Agent 已发现明确长期候选，或 finish consumer 的轻量资格判断命中时使用。
      required: false
      provides:
        - capability: buildr.task-asset-review
          version: 1
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: task-worktree
      path: package/targets/workspace/skills/buildr/task-worktree
      target: skills/buildr/task-worktree
      description: 用户要求代码开发、修 bug、实现功能、运行构建或测试、多仓协作、隔离任务分支，或清理已上线、已归档、已收尾任务的 worktree/change-id/任务分支时使用。
      required: false
      provides:
        - capability: buildr.task-worktree-lifecycle
          version: 1
      legacyIntegrities:
        - sha256-23e68c3174887ebbf6990526f93e7f1c047199e1bef1f2e8e293b0cba2a3cfad
        - sha256-7c792606db5d07e9364feb4be20755e184fb83291e4ae83a9cbb4884cf731b6d
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: task-finish
      path: package/targets/workspace/skills/buildr/task-finish
      target: skills/buildr/task-finish
      description: 用户在 task worktree 中要求“收尾”、完成任务、自动收尾，或要求自动完成已验证 change 的归档、提交、集成、推送和本地清理时使用。
      required: false
      provides:
        - capability: buildr.task-finish
          version: 1
      requires:
        - capability: buildr.task-worktree-lifecycle
          version: 1
          mode: required
        - capability: buildr.git-task-integration
          version: 1
          mode: required
        - capability: buildr.task-asset-review
          version: 1
          mode: optional
      legacyIntegrities:
        - sha256-0607663344932ed85cdff84fe5c8dc817e4fc12a159a047eac054fa307fc1fd1
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: git-ops
      path: package/targets/workspace/skills/buildr/git-ops
      target: skills/buildr/git-ops
      description: 用户表达提交、推送、拉取、pull、合并、merge、rebase、checkout、switch、reset、cherry-pick、revert、stash、发布、删除分支等单项 Git 意图，或 Git 操作存在授权、范围、amend、远端改写、工作区转换、分支删除等歧义时使用。
      required: false
      provides:
        - capability: buildr.git-single-operation
          version: 1
        - capability: buildr.git-task-integration
          version: 1
        - capability: buildr.git-workspace-update
          version: 1
      legacyIntegrities:
        - sha256-badf69cfc2f7983fdbd2c681f7418a542d5538bfab283dfe8da927bfdfdd96c8
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: openspec-explore
      path: package/targets/workspace/skills/openspec/openspec-explore
      target: skills/openspec/openspec-explore
      description: 探索想法、调查问题或澄清需求时使用；只思考和梳理，不实现代码。
      required: false
      component: openspec
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: openspec-propose
      path: package/targets/workspace/skills/openspec/openspec-propose
      target: skills/openspec/openspec-propose
      description: 用户要快速创建完整 OpenSpec change 提案、设计、规格和任务时使用。
      required: false
      component: openspec
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: openspec-apply-change
      path: package/targets/workspace/skills/openspec/openspec-apply-change
      target: skills/openspec/openspec-apply-change
      description: 用户要开始或继续实现某个 OpenSpec change 的任务时使用。
      required: false
      component: openspec
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: openspec-sync-specs
      path: package/targets/workspace/skills/openspec/openspec-sync-specs
      target: skills/openspec/openspec-sync-specs
      description: 用户要把 change 中的 delta specs 同步到主 specs，但不归档 change 时使用。
      required: false
      component: openspec
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: openspec-archive-change
      path: package/targets/workspace/skills/openspec/openspec-archive-change
      target: skills/openspec/openspec-archive-change
      description: 用户明确要归档已完成 OpenSpec change 时使用。
      required: false
      component: openspec
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
    - id: openspec-contract-guard
      path: package/targets/workspace/skills/buildr/openspec-contract-guard
      target: skills/buildr/openspec-contract-guard
      description: 创建、同步或归档 OpenSpec change 时建立契约基线，并检测并行冲突、陈旧 delta 和同步结果漂移。
      required: false
      component: openspec
      runtimes: ["claude-code","codex","cursor","qoder","trae","trae-work","workbuddy"]
  commands: []

components:
  - id: openspec
    path: package/targets/workspace/components/buildr/openspec/component.yml
    defaultEnabled: true
    required: false

workspaceDirectories:
  - commands
  - components
  - projects
  - rules
  - skills

workspaceFiles:
  - package/targets/workspace/AGENTS.md => AGENTS.md render
  - package/targets/workspace/.buildr/workspace.yml => .buildr/workspace.yml render
  - package/targets/workspace/projects/manifest.yml => projects/manifest.yml copy
  - package/targets/workspace/gitignore => .gitignore copy
  - package/targets/workspace/rules/manifest.yml => rules/manifest.yml copy
  - package/targets/workspace/rules/buildr/core.md => rules/buildr/core.md copy
  - package/targets/workspace/commands/manifest.yml => commands/manifest.yml copy
  - package/targets/workspace/components/manifest.yml => components/manifest.yml copy
  - package/targets/workspace/skills/manifest.yml => skills/manifest.yml copy
  - package/targets/workspace/skills/contracts/buildr/git-single-operation/v1.md => skills/contracts/buildr/git-single-operation/v1.md copy
  - package/targets/workspace/skills/contracts/buildr/git-task-integration/v1.md => skills/contracts/buildr/git-task-integration/v1.md copy
  - package/targets/workspace/skills/contracts/buildr/git-workspace-update/v1.md => skills/contracts/buildr/git-workspace-update/v1.md copy
  - package/targets/workspace/skills/contracts/buildr/task-worktree-lifecycle/v1.md => skills/contracts/buildr/task-worktree-lifecycle/v1.md copy
  - package/targets/workspace/skills/contracts/buildr/task-finish/v1.md => skills/contracts/buildr/task-finish/v1.md copy
  - package/targets/workspace/skills/contracts/buildr/task-asset-review/v1.md => skills/contracts/buildr/task-asset-review/v1.md copy
  - package/targets/workspace/skills/buildr/task-triage/SKILL.md => skills/buildr/task-triage/SKILL.md copy
  - package/targets/workspace/skills/buildr/task-cockpit/SKILL.md => skills/buildr/task-cockpit/SKILL.md copy
  - package/targets/workspace/skills/buildr/task-cockpit/agents/openai.yaml => skills/buildr/task-cockpit/agents/openai.yaml copy
  - package/targets/workspace/skills/buildr/task-cockpit/assets/task-cockpit-template.html => skills/buildr/task-cockpit/assets/task-cockpit-template.html copy
  - package/targets/workspace/skills/buildr/capability-adaptation/SKILL.md => skills/buildr/capability-adaptation/SKILL.md copy
  - package/targets/workspace/skills/buildr/capability-adaptation/agents/openai.yaml => skills/buildr/capability-adaptation/agents/openai.yaml copy
  - package/targets/workspace/skills/buildr/task-asset-review/SKILL.md => skills/buildr/task-asset-review/SKILL.md copy
  - package/targets/workspace/skills/buildr/task-asset-review/agents/openai.yaml => skills/buildr/task-asset-review/agents/openai.yaml copy
  - package/targets/workspace/skills/buildr/task-worktree/SKILL.md => skills/buildr/task-worktree/SKILL.md copy
  - package/targets/workspace/skills/buildr/task-finish/SKILL.md => skills/buildr/task-finish/SKILL.md copy
  - package/targets/workspace/skills/buildr/git-ops/SKILL.md => skills/buildr/git-ops/SKILL.md copy

projectDirectories:
  - openspec/specs
  - openspec/knowledge
  - openspec/changes
  - skills
  - services

projectFiles:
  - package/targets/workspace/projects/AGENTS.project.md => AGENTS.md render
  - package/targets/workspace/projects/services/manifest.yml => services/manifest.yml render
  - package/targets/workspace/projects/skills/manifest.yml => skills/manifest.yml copy

templateVariables:
  - name
  - profile
  - project

forbiddenPatterns:
  - /Users/
  - organizations/
  - rules/AGENTS.private.md
  - integrations/openspec.md

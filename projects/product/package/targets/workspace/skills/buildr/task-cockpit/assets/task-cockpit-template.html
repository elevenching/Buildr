<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Agent 单向维护的任务可视化驾驶舱。">
  <title>任务驾驶舱</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #dfe5ec;
      --paper: #fff;
      --canvas: #f3f6f8;
      --navy: #14213d;
      --teal: #087f76;
      --teal-soft: #ddf4f0;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --amber: #b96300;
      --amber-soft: #fff3d7;
      --red: #b83a34;
      --red-soft: #fff0ee;
      --green: #15803d;
      --green-soft: #eaf8ee;
      --shadow: 0 14px 40px rgba(20, 33, 61, .09);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 2%, rgba(8, 127, 118, .09), transparent 24rem),
        radial-gradient(circle at 92% 8%, rgba(37, 99, 235, .07), transparent 28rem),
        var(--canvas);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
      line-height: 1.6;
    }
    button, a { font: inherit; }
    .page { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 32px 0 72px; }
    .hero {
      padding: 46px;
      color: #fff;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--navy), #183d52 62%, #0b625e);
      box-shadow: var(--shadow);
    }
    .hero-top, .section-head, .split, .metric-row, .tab-list { display: flex; }
    .hero-top { align-items: center; justify-content: space-between; gap: 18px; }
    .eyebrow, .status, .tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
    }
    .eyebrow { color: #caf8ee; border: 1px solid rgba(202, 248, 238, .35); background: rgba(8, 127, 118, .27); }
    .hero h1 { max-width: 850px; margin: 22px 0 0; overflow-wrap: anywhere; font-size: clamp(34px, 5vw, 60px); line-height: 1.12; letter-spacing: -.045em; }
    .hero-lead { max-width: 840px; margin: 18px 0 0; overflow-wrap: anywhere; color: rgba(255, 255, 255, .8); font-size: 18px; }
    .metric-row { gap: 14px; margin-top: 30px; }
    .metric { flex: 1; min-width: 0; padding: 16px 18px; border: 1px solid rgba(255, 255, 255, .14); border-radius: 16px; background: rgba(255, 255, 255, .075); }
    .metric strong { display: block; overflow-wrap: anywhere; font-size: 22px; line-height: 1.25; }
    .metric span { display: block; margin-top: 4px; color: rgba(255, 255, 255, .66); font-size: 12px; }
    .tabs { position: sticky; top: 0; z-index: 10; margin: 18px 0 0; padding: 10px; border: 1px solid rgba(223, 229, 236, .95); border-radius: 18px; background: rgba(255, 255, 255, .92); box-shadow: 0 8px 28px rgba(20, 33, 61, .06); backdrop-filter: blur(14px); }
    .tab-list { gap: 8px; overflow-x: auto; }
    .tab {
      flex: 0 0 auto;
      padding: 10px 16px;
      color: var(--muted);
      border: 0;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      font-weight: 800;
    }
    .tab[aria-selected="true"] { color: #fff; background: var(--navy); }
    .panel { display: none; }
    .panel.active { display: block; }
    .section { margin-top: 22px; padding: 30px; border: 1px solid rgba(223, 229, 236, .96); border-radius: var(--radius); background: rgba(255, 255, 255, .95); box-shadow: 0 8px 28px rgba(20, 33, 61, .05); }
    .section-head { align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 20px; }
    .section h2 { margin: 0; color: var(--navy); font-size: 24px; line-height: 1.25; }
    .section-desc { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .focus { padding: 24px; border-radius: 18px; background: linear-gradient(135deg, var(--blue-soft), #f7fbff); border: 1px solid #cbdcff; }
    .focus-label { color: var(--blue); font-size: 12px; font-weight: 900; letter-spacing: .08em; }
    .focus h2 { margin: 8px 0 0; font-size: clamp(24px, 3.4vw, 38px); }
    .focus p { max-width: 840px; margin: 10px 0 0; color: #40516e; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { min-width: 0; padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: #fff; }
    .card h3 { margin: 8px 0 0; overflow-wrap: anywhere; color: var(--navy); font-size: 18px; }
    .card p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .tag.done { color: var(--green); background: var(--green-soft); }
    .tag.current { color: var(--blue); background: var(--blue-soft); }
    .tag.next { color: var(--amber); background: var(--amber-soft); }
    .tag.blocked { color: var(--red); background: var(--red-soft); }
    .status { color: #fff; background: rgba(255, 255, 255, .15); }
    .alert { padding: 18px 20px; border-left: 4px solid var(--amber); border-radius: 14px; background: var(--amber-soft); }
    .alert strong { display: block; color: #7c4500; }
    .alert p { margin: 5px 0 0; color: #765523; }
    .flow { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .flow-step { position: relative; padding: 18px; border: 1px solid var(--line); border-radius: 16px; background: #fff; }
    .flow-step:not(:last-child)::after { position: absolute; right: -10px; top: 50%; content: "→"; color: #96a1b3; font-weight: 900; transform: translateY(-50%); }
    .flow-step strong { display: block; color: var(--navy); }
    .flow-step span { display: block; margin-top: 5px; color: var(--muted); font-size: 13px; }
    .timeline { display: grid; gap: 12px; }
    .stage { display: grid; grid-template-columns: 150px 1fr; gap: 18px; padding: 20px; border: 1px solid var(--line); border-radius: 16px; background: #fff; }
    .stage.current { border-color: #a8c5ff; background: #f7faff; }
    .stage.blocked { border-color: #f2c5c2; background: #fffafa; }
    .stage-title strong { display: block; margin-top: 8px; }
    .stage-body p { margin: 0; color: var(--muted); }
    .compact-list { margin: 12px 0 0; padding-left: 20px; }
    .compact-list li + li { margin-top: 6px; }
    .split { gap: 14px; }
    .split > * { flex: 1; }
    .evidence { display: grid; gap: 10px; }
    .evidence-item { padding: 15px 17px; border: 1px solid var(--line); border-radius: 13px; background: #fbfcfe; }
    .evidence-item strong { display: block; }
    .evidence-item span, .evidence-item a { display: block; margin-top: 4px; color: var(--muted); overflow-wrap: anywhere; font-size: 13px; }
    pre { margin: 12px 0 0; padding: 17px; overflow: auto; color: #e8edf7; border-radius: 14px; background: #111a2d; font: 13px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    footer { display: flex; justify-content: space-between; gap: 16px; margin-top: 26px; color: var(--muted); font-size: 12px; }
    .empty { color: var(--muted); font-style: italic; }
    @media (max-width: 820px) {
      .page { width: min(100% - 24px, 1180px); padding-top: 12px; }
      .hero { padding: 28px 22px; border-radius: 22px; }
      .hero-top, .section-head, .split, footer { align-items: stretch; flex-direction: column; }
      .metric-row { display: grid; grid-template-columns: 1fr; }
      .grid, .flow { grid-template-columns: 1fr; }
      .flow-step:not(:last-child)::after { right: auto; left: 50%; top: auto; bottom: -18px; content: "↓"; transform: translateX(-50%); }
      .stage { grid-template-columns: 1fr; gap: 10px; }
      .section { padding: 22px 18px; }
      .tabs { top: 6px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <span class="eyebrow">TASK COCKPIT · AGENT MAINTAINED</span>
        <span class="status" id="hero-status">待更新</span>
      </div>
      <h1 id="hero-title">任务驾驶舱</h1>
      <p class="hero-lead" id="hero-purpose">用一句普通人能理解的话说明这个任务要解决什么。</p>
      <div class="metric-row" id="hero-metrics"></div>
    </header>

    <nav class="tabs" aria-label="驾驶舱视图">
      <div class="tab-list" role="tablist">
        <button class="tab" role="tab" aria-selected="true" aria-controls="overview-panel" data-tab="overview">首页</button>
        <button class="tab" role="tab" aria-selected="false" aria-controls="progress-panel" data-tab="progress">推进</button>
        <button class="tab" role="tab" aria-selected="false" aria-controls="solution-panel" data-tab="solution">方案</button>
        <button class="tab" role="tab" aria-selected="false" aria-controls="technical-panel" data-tab="technical">技术细节</button>
      </div>
    </nav>

    <section class="panel active" id="overview-panel" data-panel="overview"></section>
    <section class="panel" id="progress-panel" data-panel="progress"></section>
    <section class="panel" id="solution-panel" data-panel="solution"></section>
    <section class="panel" id="technical-panel" data-panel="technical"></section>

    <footer>
      <span id="footer-id"></span>
      <span>由 Agent 单向维护 · 页面只读</span>
    </footer>
  </main>

  <script id="cockpit-data" type="application/json">
  {
    "meta": {
      "title": "任务名称",
      "taskId": "task-id",
      "status": "进行中",
      "phase": "批次 1 · 待开始",
      "taskProgress": "当前批次 0 / 0 · 依赖池 0 组",
      "updatedAt": "yyyy-MM-dd HH:mm",
      "relativePath": "projects/<project>/openspec/knowledge/task-cockpits/yyyy-MM-dd-task-id.html"
    },
    "overview": {
      "purpose": "用一句话说明这个任务要解决什么，以及完成后用户会得到什么。",
      "conclusion": "先写当前最重要的结论。",
      "currentFocus": "说明 Agent 现在正在推进什么。",
      "userAttention": "没有需要用户立即处理的事项。",
      "highlights": {
        "done": { "title": "已经完成", "text": "列出最重要的已完成结果。" },
        "current": { "title": "正在进行", "text": "列出当前工作和预期产物。" },
        "next": { "title": "下一步", "text": "列出下一项可执行动作。" }
      },
      "blockers": [],
      "flow": [
        { "title": "理解目标", "text": "确认任务范围" },
        { "title": "形成方案", "text": "明确整体路径" },
        { "title": "推进实现", "text": "完成关键任务" },
        { "title": "验证交付", "text": "形成可信结果" }
      ]
    },
    "changes": [
      {
        "id": "change-id",
        "status": "active",
        "path": "openspec/changes/change-id/",
        "summary": "说明该 change 对完整任务的交付作用。",
        "batchIds": ["batch-1"]
      }
    ],
    "progress": {
      "batches": [
        {
          "id": "batch-1",
          "status": "current",
          "label": "当前批次",
          "title": "批次 1 · 可独立交付任务组",
          "summary": "说明该批次可以独立形成方案、实施和验收。",
          "deliverable": "说明该批次完成后可验收的交付结果。",
          "changeIds": ["change-id"],
          "items": []
        }
      ],
      "dependencyPool": []
    },
    "solution": {
      "summary": "用普通语言说明完整任务范围内的业务与技术解决方式，不描述看板自身如何管理任务。",
      "businessPlan": [
        {
          "label": "业务模块",
          "title": "模块业务方案",
          "text": "说明该模块的目标流程、角色职责、业务状态或资金与数据流向。"
        }
      ],
      "technicalPlan": [
        {
          "label": "技术模块",
          "title": "模块技术方案",
          "text": "说明开发前已确认的系统交互、接口契约、状态处理、实现边界和验证策略。"
        }
      ],
      "boundaries": { "inScope": [], "outOfScope": [] },
      "decisions": []
    },
    "technical": { "details": [] }
  }
  </script>
  <script>
    (() => {
      const dataNode = document.getElementById('cockpit-data');
      let data;
      try { data = JSON.parse(dataNode.textContent); }
      catch (error) {
        document.body.innerHTML = '<main class="page"><section class="section"><h1>驾驶舱数据无法解析</h1><p>请让 Agent 检查 #cockpit-data JSON。</p></section></main>';
        return;
      }

      const el = (tag, className, text) => {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined && text !== null) node.textContent = text;
        return node;
      };
      const appendList = (items) => {
        if (!items || !items.length) return el('p', 'empty', '暂无');
        const list = el('ul', 'compact-list');
        items.forEach(item => list.append(el('li', '', item)));
        return list;
      };
      const section = (title, desc) => {
        const wrap = el('section', 'section');
        const head = el('div', 'section-head');
        const titleWrap = el('div');
        titleWrap.append(el('h2', '', title));
        if (desc) titleWrap.append(el('p', 'section-desc', desc));
        head.append(titleWrap);
        wrap.append(head);
        return wrap;
      };

      document.title = `${data.meta.title}｜任务看板`;
      document.getElementById('hero-title').textContent = data.meta.title;
      document.getElementById('hero-purpose').textContent = data.overview.purpose;
      document.getElementById('hero-status').textContent = data.meta.status;
      document.getElementById('footer-id').textContent = `${data.meta.taskId} · ${data.meta.relativePath}`;
      const metrics = [
        [data.meta.phase, '当前批次'],
        [data.meta.taskProgress, '可核实进度'],
        [data.meta.updatedAt, '最近更新']
      ];
      const metricRow = document.getElementById('hero-metrics');
      metrics.forEach(([value, label]) => {
        const card = el('div', 'metric');
        card.append(el('strong', '', value), el('span', '', label));
        metricRow.append(card);
      });

      const overviewPanel = document.getElementById('overview-panel');
      const focus = section('当前最重要的事');
      const focusBox = el('div', 'focus');
      focusBox.append(el('span', 'focus-label', 'CURRENT FOCUS'), el('h2', '', data.overview.conclusion), el('p', '', data.overview.currentFocus));
      focus.append(focusBox);
      overviewPanel.append(focus);

      const highlights = section('一眼看懂推进情况', '只保留已经完成、正在做和下一步三个重点。');
      const highlightGrid = el('div', 'grid');
      [['done', 'done'], ['current', 'current'], ['next', 'next']].forEach(([key, status]) => {
        const item = data.overview.highlights[key];
        const card = el('article', 'card');
        card.append(el('span', `tag ${status}`, item.title), el('h3', '', item.text));
        highlightGrid.append(card);
      });
      highlights.append(highlightGrid);
      overviewPanel.append(highlights);

      const attention = section('需要关注', '阻塞和需要用户判断的事项必须集中展示。');
      if (data.overview.blockers && data.overview.blockers.length) {
        data.overview.blockers.forEach(item => {
          const alert = el('div', 'alert');
          alert.append(el('strong', '', item.title), el('p', '', item.text));
          attention.append(alert);
        });
      } else {
        const alert = el('div', 'alert');
        alert.append(el('strong', '', '当前无阻塞'), el('p', '', data.overview.userAttention));
        attention.append(alert);
      }
      overviewPanel.append(attention);

      const flowSection = section('整体怎么推进', '首页只展示最短路径，详细方案放在后续视图。');
      const flow = el('div', 'flow');
      (data.overview.flow || []).forEach(item => {
        const step = el('div', 'flow-step');
        step.append(el('strong', '', item.title), el('span', '', item.text));
        flow.append(step);
      });
      flowSection.append(flow);
      overviewPanel.append(flowSection);

      const progressPanel = document.getElementById('progress-panel');
      const changeSection = section('关联的 OpenSpec changes', '看板至少关联一个真实 change；状态和路径由 Agent 从权威事实核实。');
      const changeGrid = el('div', 'grid');
      (data.changes || []).forEach(change => {
        const card = el('article', 'card');
        card.append(el('span', `tag ${change.status === 'archived' ? 'done' : 'current'}`, change.status || '待核实'));
        card.append(el('h3', '', change.id), el('p', '', change.summary));
        card.append(el('p', 'section-desc', change.path));
        card.append(el('p', 'section-desc', `关联批次：${(change.batchIds || []).join('、') || '待核实'}`));
        changeGrid.append(card);
      });
      if (!changeGrid.children.length) changeGrid.append(el('p', 'empty', '错误：任务看板尚未关联真实 OpenSpec change。'));
      changeSection.append(changeGrid);
      progressPanel.append(changeSection);

      const progressSection = section('已形成的交付批次', '每个批次是一组可以独立形成方案、实施和验收的任务，并显式记录关联 change。');
      const timeline = el('div', 'timeline');
      (data.progress.batches || []).forEach(stageData => {
        const stage = el('article', `stage ${stageData.status || ''}`);
        const title = el('div', 'stage-title');
        title.append(el('span', `tag ${stageData.status || 'next'}`, stageData.label || stageData.status), el('strong', '', stageData.title));
        const body = el('div', 'stage-body');
        body.append(el('p', '', stageData.summary));
        if (stageData.deliverable) body.append(el('p', 'section-desc', `交付：${stageData.deliverable}`));
        body.append(el('p', 'section-desc', `关联 change：${(stageData.changeIds || []).join('、') || 'code-only / 外部交付'}`), appendList(stageData.items));
        stage.append(title, body);
        timeline.append(stage);
      });
      if (!timeline.children.length) timeline.append(el('p', 'empty', 'Agent 尚未形成交付批次。'));
      progressSection.append(timeline);
      progressPanel.append(progressSection);

      if ((data.progress.dependencyPool || []).length) {
        const dependencySection = section('依赖任务池', '尚未满足实施条件的任务继续属于完整任务；已就绪部分拆成新批次，其余继续留池。');
        const dependencyTimeline = el('div', 'timeline');
        data.progress.dependencyPool.forEach(item => {
          const stage = el('article', `stage ${item.status || 'next'}`);
          const title = el('div', 'stage-title');
          title.append(el('span', `tag ${item.status || 'next'}`, item.label || '依赖中'), el('strong', '', item.title));
          const body = el('div', 'stage-body');
          body.append(el('p', '', item.summary));
          if (item.entryCondition) body.append(el('p', 'section-desc', `进入条件：${item.entryCondition}`));
          if (item.unaffectedBatchIds) body.append(el('p', 'section-desc', `不影响批次：${item.unaffectedBatchIds.join('、') || '无'}`));
          body.append(appendList(item.items));
          stage.append(title, body);
          dependencyTimeline.append(stage);
        });
        dependencySection.append(dependencyTimeline);
        progressPanel.append(dependencySection);
      }

      const solutionPanel = document.getElementById('solution-panel');
      const summary = section('业务与技术方案', '说明完整任务涉及模块的业务流程、系统处理方式和关键设计选择。');
      summary.append(el('div', 'focus', data.solution.summary));
      solutionPanel.append(summary);
      const solutionGroups = [
        ['业务方案', '按相关业务模块说明完整任务要解决什么。', data.solution.businessPlan],
        ['技术方案', '记录开发前已确认的系统交互、状态处理、实现边界和验证策略。', data.solution.technicalPlan]
      ];
      solutionGroups.forEach(([titleText, desc, items]) => {
        const group = section(titleText, desc);
        const grid = el('div', 'grid');
        (items || []).forEach(item => {
          const card = el('article', 'card');
          card.append(el('span', 'tag current', item.label), el('h3', '', item.title), el('p', '', item.text));
          grid.append(card);
        });
        if (!grid.children.length) grid.append(el('p', 'empty', '暂无。'));
        group.append(grid);
        solutionPanel.append(group);
      });
      const boundaries = section('范围与边界');
      const split = el('div', 'split');
      [['本次处理', data.solution.boundaries.inScope], ['明确不处理', data.solution.boundaries.outOfScope]].forEach(([titleText, items]) => {
        const card = el('article', 'card');
        card.append(el('h3', '', titleText), appendList(items));
        split.append(card);
      });
      boundaries.append(split);
      solutionPanel.append(boundaries);
      const decisions = section('关键选择', '只记录影响整体方案的决定及理由。');
      const decisionGrid = el('div', 'grid');
      (data.solution.decisions || []).forEach(item => {
        const card = el('article', 'card');
        card.append(el('span', 'tag current', item.label || '决定'), el('h3', '', item.title), el('p', '', item.reason));
        decisionGrid.append(card);
      });
      if (!decisionGrid.children.length) decisionGrid.append(el('p', 'empty', '暂无关键选择。'));
      decisions.append(decisionGrid);
      solutionPanel.append(decisions);

      const technicalPanel = document.getElementById('technical-panel');
      const technicalDetails = data.technical.details || [];
      if (!technicalDetails.length) {
        const emptyDetails = section('复杂任务技术细节', '只记录已经完成、且确有技术含量或沉淀价值的任务。');
        emptyDetails.append(el('p', 'empty', '当前暂无需要回写的复杂任务技术细节。'));
        technicalPanel.append(emptyDetails);
      }
      technicalDetails.forEach(detail => {
        const group = section(detail.title || `任务 ${detail.taskId}`, detail.summary || '已完成复杂任务的关键实现说明。');
        const evidence = el('div', 'evidence');
        (detail.items || []).forEach(item => {
          const card = el('div', 'evidence-item');
          card.append(el('strong', '', item.title));
          if (item.text) card.append(el('span', '', item.text));
          if (item.path) card.append(el('span', '', item.path));
          evidence.append(card);
        });
        if (!evidence.children.length) evidence.append(el('p', 'empty', '暂无。'));
        group.append(evidence);
        technicalPanel.append(group);
        (detail.snippets || []).forEach(snippet => group.append(el('pre', '', snippet.code)));
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const target = tab.dataset.tab;
          document.querySelectorAll('.tab').forEach(item => item.setAttribute('aria-selected', item === tab ? 'true' : 'false'));
          document.querySelectorAll('.panel').forEach(panel => panel.classList.toggle('active', panel.dataset.panel === target));
          window.scrollTo({ top: document.querySelector('.tabs').offsetTop - 6, behavior: 'smooth' });
        });
      });
    })();
  </script>
</body>
</html>

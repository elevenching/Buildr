schemaVersion: buildr.skills/v2
skills:
  - id: task-triage
    source: buildr
    path: buildr/task-triage
    description: 用户要求修 bug、实现或调整功能、改需求、重构、优化、补文档、补测试、调整 API/契约/权限/状态流/数据语义，或询问某项改动是否需要更新 spec、创建 change、只改代码时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: task-triage
  - id: task-worktree
    source: buildr
    path: buildr/task-worktree
    description: 用户要求代码开发、修 bug、实现功能、运行构建或测试、多仓协作、隔离任务分支，或清理已上线、已归档、已收尾任务的 worktree/change-id/任务分支时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: task-worktree
    provides:
      - capability: buildr.task-worktree-lifecycle
        version: 1
  - id: git-ops
    source: buildr
    path: buildr/git-ops
    description: 用户表达提交、推送、拉取、pull、合并、merge、rebase、checkout、switch、reset、cherry-pick、revert、stash、发布、删除分支等单项 Git 意图，或 Git 操作存在授权、范围、amend、远端改写、工作区转换、分支删除等歧义时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: git-ops
    provides:
      - capability: buildr.git-single-operation
        version: 1
      - capability: buildr.git-task-integration
        version: 1
      - capability: buildr.git-workspace-update
        version: 1
  - id: task-finish
    source: buildr
    path: buildr/task-finish
    description: 用户在 task worktree 中要求“收尾”、完成任务、自动收尾，或要求自动完成已验证 change 的归档、提交、集成、推送和本地清理时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: task-finish
    provides:
      - capability: buildr.task-finish
        version: 1
    requires:
      - capability: buildr.task-worktree-lifecycle
        version: 1
        mode: required
      - capability: buildr.git-task-integration
        version: 1
        mode: required
      - capability: buildr.task-asset-review
        version: 1
        mode: optional
  - id: openspec-contract-guard
    source: buildr
    path: buildr/openspec-contract-guard
    description: 创建、同步或归档 OpenSpec change 时建立契约基线，并检测并行冲突、陈旧 delta 和同步结果漂移。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: openspec-contract-guard
  - id: openspec-explore
    source: openspec
    path: openspec/openspec-explore
    description: 探索想法、调查问题或澄清需求时使用；只思考和梳理，不实现代码。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: openspec-explore
  - id: openspec-propose
    source: openspec
    path: openspec/openspec-propose
    description: 用户要快速创建完整 OpenSpec change 提案、设计、规格和任务时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: openspec-propose
  - id: openspec-apply-change
    source: openspec
    path: openspec/openspec-apply-change
    description: 用户要开始或继续实现某个 OpenSpec change 的任务时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: openspec-apply-change
  - id: openspec-sync-specs
    source: openspec
    path: openspec/openspec-sync-specs
    description: 用户要把 change 中的 delta specs 同步到主 specs，但不归档 change 时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: openspec-sync-specs
  - id: openspec-archive-change
    source: openspec
    path: openspec/openspec-archive-change
    description: 用户明确要归档已完成 OpenSpec change 时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: openspec-archive-change
  - id: task-cockpit
    source: buildr
    path: buildr/task-cockpit
    description: 为复杂、长期、跨批次、跨 change、跨服务或团队的任务维护只读 HTML 任务驾驶舱（任务看板）、change 关联、交付批次和依赖池；用户明确要求任务看板、整体进度或长期跟踪时也使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: task-cockpit
  - id: task-asset-review
    source: buildr
    path: buildr/task-asset-review
    description: 用户明确要求复盘任务执行质量、核对现有资产覆盖、总结可沉淀的 Skill 或 Rule，Agent 已发现明确长期候选，或 finish consumer 的轻量资格判断命中时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: task-asset-review
    provides:
      - capability: buildr.task-asset-review
        version: 1
  - id: capability-adaptation
    source: buildr
    path: buildr/capability-adaptation
    description: 用户要求采用内部流程、调整工作方式、修改默认 Skill 行为、创建或替换专业 Skill、卸载可能被编排的 Skill，或 Agent 准备改变 capability contract 及跨 Skill 协作边界时使用。
    enabled: true
    required: false
    state: installed
    runtimes:
      - claude-code
      - codex
      - cursor
      - qoder
      - trae
      - trae-work
      - workbuddy
    runtimePath: capability-adaptation
contracts:
  - id: buildr.git-single-operation
    version: 1
    path: contracts/buildr/git-single-operation/v1.md
    description: 安全执行一个明确的 Git 操作并返回可审计结果。
  - id: buildr.git-task-integration
    version: 1
    path: contracts/buildr/git-task-integration/v1.md
    description: 提交并把已验证任务安全集成到目标分支。
  - id: buildr.git-workspace-update
    version: 1
    path: contracts/buildr/git-workspace-update/v1.md
    description: 在 workspace sync 前安全更新 Git checkout。
  - id: buildr.task-worktree-lifecycle
    version: 1
    path: contracts/buildr/task-worktree-lifecycle/v1.md
    description: 管理任务 worktree 的放置、保留和安全清理。
  - id: buildr.task-finish
    version: 1
    path: contracts/buildr/task-finish/v1.md
    description: 编排已验证任务的归档、集成、推送与本地收尾。
  - id: buildr.task-asset-review
    version: 1
    path: contracts/buildr/task-asset-review/v1.md
    description: 审查任务过程并提出可沉淀工作资产候选。
bindings:
  - capability: buildr.git-single-operation
    version: 1
    provider: git-ops
  - capability: buildr.git-task-integration
    version: 1
    provider: git-ops
  - capability: buildr.git-workspace-update
    version: 1
    provider: git-ops
  - capability: buildr.task-worktree-lifecycle
    version: 1
    provider: task-worktree
  - capability: buildr.task-finish
    version: 1
    provider: task-finish
  - capability: buildr.task-asset-review
    version: 1
    provider: task-asset-review
